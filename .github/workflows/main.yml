name: Shadow Economy Scanner

on:
  schedule:
    # Runs every Sunday at 00:00 UTC (Adjust as needed)
    - cron: '0 0 * * 0'
  workflow_dispatch: # This allows you to run it manually with a button

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests google-generativeai

      - name: Run Scanner Script
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          RAPIDAPI_HOST: ${{ secrets.RAPIDAPI_HOST }}
          GUMROAD_CLIENT_ID: ${{ secrets.GUMROAD_CLIENT_ID }}
          GUMROAD_CLIENT_SECRET: ${{ secrets.GUMROAD_CLIENT_SECRET }}
        run: |
          echo "Scanner is starting..."
          # We will add the Python script file next.
          python scanner.py
