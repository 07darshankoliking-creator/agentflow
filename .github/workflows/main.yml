name: Shadow Economy Scanner

on:
  schedule:
    - cron: '0 0 * * 0'  # Runs every Sunday at midnight UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests google-generativeai fpdf

      - name: Run Scanner Script
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GUMROAD_ACCESS_TOKEN: ${{ secrets.GUMROAD_ACCESS_TOKEN }}
        run: python scanner.py

      - name: Upload PDF Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Shadow-Economy-Report-PDF
          path: report_*.pdf

      - name: Upload Product URL
        uses: actions/upload-artifact@v4
        with:
          name: Product-URL
          path: latest_product_url.txt
  tweet:
    needs: build
    runs-on: ubuntu-latest
    if: needs.build.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Product URL
        uses: actions/download-artifact@v4
        with:
          name: Product-URL

      - name: Read URL and Compose Tweet
        id: vars
        run: |
          PRODUCT_URL=$(cat latest_product_url.txt)
          echo "TWEET_TEXT=🚀 New market gap detected. Fresh intelligence just dropped. Limited copies available. 👇 $PRODUCT_URL" >> $GITHUB_OUTPUT

      - name: Send Tweet
        uses: smapiot/send-tweet-v2-action@v2
        with:
          status: ${{ steps.vars.outputs.TWEET_TEXT }}
          consumer-key: ${{ secrets.TWITTER_API_KEY }}
          consumer-secret: ${{ secrets.TWITTER_API_KEY_SECRET }}
          access-token: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          access-token-secret: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
