name: Twitter Report Promoter

on:
  workflow_run:
    workflows: ["Shadow Economy Scanner"]
    types:
      - completed

jobs:
  tweet:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Download Product URL
        uses: actions/download-artifact@v4
        with:
          name: Product-URL
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read URL and Tweet
        run: |
          URL=$(cat latest_product_url.txt)
          curl -X POST "https://api.twitter.com/2/tweets" \
            -H "Authorization: Bearer ${{ secrets.TWITTER_BEARER_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"🚀 New Shadow Economy Report just dropped! This week's uncovered niche: [See report]. Limited to 50 copies. $URL\"}"
